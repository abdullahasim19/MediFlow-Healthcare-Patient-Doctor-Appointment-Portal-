<mat-toolbar color="primary" class="header">
  <button mat-icon-button (click)="sidenav.toggle()" class="menu-button">
    <mat-icon>menu</mat-icon>
  </button>
  
  <div class="logo-container">
    <img src="assets/images/logo-white.svg" alt="MediFlow" class="logo">
    <span class="app-title">MediFlow</span>
  </div>
  
  <span class="spacer"></span>
  
  <div class="header-actions">
    <button mat-icon-button [matMenuTriggerFor]="notificationMenu" class="notification-btn">
      <mat-icon>notifications</mat-icon>
      <span class="notification-badge" *ngIf="notificationCount > 0">{{ notificationCount }}</span>
    </button>
    
    <button mat-icon-button [matMenuTriggerFor]="userMenu" class="user-menu-btn">
      <div class="user-avatar">{{ getUserInitials() }}</div>
    </button>
  </div>
</mat-toolbar>

<mat-menu #userMenu="matMenu" xPosition="before">
  <button mat-menu-item (click)="goToProfile()">
    <mat-icon>account_circle</mat-icon>
    <span>Profile</span>
  </button>
  <button mat-menu-item (click)="goToSettings()">
    <mat-icon>settings</mat-icon>
    <span>Settings</span>
  </button>
  <mat-divider></mat-divider>
  <button mat-menu-item (click)="logout()">
    <mat-icon>exit_to_app</mat-icon>
    <span>Logout</span>
  </button>
</mat-menu>

<mat-menu #notificationMenu="matMenu" xPosition="before">
  <div class="notification-header">
    <span>Notifications</span>
    <button mat-button color="primary">Mark all read</button>
  </div>
  <mat-divider></mat-divider>
  <div class="notification-list">
    <div class="notification-empty" *ngIf="notificationCount === 0">
      <mat-icon>notifications_none</mat-icon>
      <p>No notifications</p>
    </div>
    <!-- Notification items would go here -->
  </div>
</mat-menu>
